name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Regenerate Gradle Wrapper JAR
        run: |
          GRADLE_VERSION=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties \
            | sed 's/.*gradle-\(.*\)-bin.zip/\1/')
          echo "Gradle version detected: $GRADLE_VERSION"
          wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" \
            -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-install
          /tmp/gradle-install/gradle-${GRADLE_VERSION}/bin/gradle \
            wrapper \
            --gradle-version=${GRADLE_VERSION} \
            --distribution-type=bin \
            -p .
          echo "JAR regenerado: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: lenspro-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14