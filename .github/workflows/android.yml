name: Android CI Build - Rodyto Lens Pro

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout del código
        uses: actions/checkout@v4

      - name: 2. Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 3. Configurar Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 4. Configurar SDK de Android
        uses: android-actions/setup-android@v3

      - name: 5. Instalar plataformas (API 35) + NDK + CMake
        shell: bash
        run: |
          echo "y" | sdkmanager --install \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;25.1.8937393" \
            "cmake;3.22.1"

      - name: 6. Compilar APK
        run: ./gradlew :app:assembleDebug
