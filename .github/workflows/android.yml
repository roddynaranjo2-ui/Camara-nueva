name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Instalar NDK y CMake
      uses: android-actions/setup-android@v3

    - name: Instalar versión específica de NDK
      run: |
        echo "y" | sdkmanager --install "ndk;25.1.8937393" "cmake;3.22.1"
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.1.8937393" >> $GITHUB_ENV

    - name: Dar permisos de ejecución a Gradlew
      run: chmod +x gradlew

    - name: Compilar APK con Gradle
      run: ./gradlew assembleDebug

    - name: Subir APK generada
      uses: actions/upload-artifact@v4
      with:
        name: RodytoLensPro-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk