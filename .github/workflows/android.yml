name: Android CI Build - Rodyto Lens Pro

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Permite disparar la compilación manualmente

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Configurar SDK de Android
      uses: android-actions/setup-android@v3

    - name: Instalar NDK y CMake específicos
      run: |
        # Instalamos la versión exacta que requiere tu proyecto para evitar errores de enlace en C++
        echo "y" | sdkmanager --install "ndk;25.1.8937393" "cmake;3.22.1"
        # Configuramos las variables de entorno para que Gradle encuentre el NDK en Android 16
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.1.8937393" >> $GITHUB_ENV

    - name: Dar permisos de ejecución a Gradlew
      run: chmod +x gradlew

    - name: Sincronizar y Compilar APK (Debug)
      # Usamos 'assembleDebug' porque es el comando estándar para generar el APK de prueba
      run: ./gradlew assembleDebug --stacktrace

    - name: Subir APK generado
      uses: actions/upload-artifact@v4
      with:
        name: RodytoLensPro-Alpha
        path: app/build/outputs/apk/debug/app-debug.apk
