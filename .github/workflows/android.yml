name: Android CI Build - Rodyto Lens Pro

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout del código
        uses: actions/checkout@v4

      - name: 2. Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: 3. Configurar SDK de Android
        uses: android-actions/setup-android@v3

      - name: 4. Instalar plataformas + NDK + CMake (Android 15 SDK 35)
        shell: bash
        run: |
          set -e
          echo "y" | sdkmanager --install \
            "platforms;android-35" \
            "platforms;android-34" \
            "build-tools;35.0.0" \
            "build-tools;34.0.0" \
            "ndk;26.1.10909125" \
            "cmake;3.22.1"

      - name: 5. Reparar y validar Gradle Wrapper
        shell: bash
        run: |
          set -e
          WRAPPER_JAR="gradle/wrapper/gradle-wrapper.jar"
          WRAPPER_PROPS="gradle/wrapper/gradle-wrapper.properties"
          mkdir -p gradle/wrapper

          echo "🔍 Verificando Gradle Wrapper..."

          WRAPPER_VALID=false
          if [ -s "$WRAPPER_JAR" ]; then
            if unzip -q -p "$WRAPPER_JAR" META-INF/MANIFEST.MF 2>/dev/null | grep -q "GradleWrapperMain"; then
              WRAPPER_VALID=true
            fi
          fi

          if [ "$WRAPPER_VALID" = "false" ]; then
            echo "⚠️  Wrapper inválido o ausente. Regenerando con Gradle 8.9..."
            rm -f "$WRAPPER_JAR"

            GRADLE_VERSION="8.9"
            curl -fL --retry 5 --retry-delay 3 \
              -o /tmp/gradle.zip \
              "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
            unzip -q -o /tmp/gradle.zip -d /tmp/gradle-dist
            export PATH="/tmp/gradle-dist/gradle-${GRADLE_VERSION}/bin:$PATH"

            echo "🔧 Generando wrapper oficial (Gradle ${GRADLE_VERSION})..."
            gradle wrapper \
              --gradle-version "${GRADLE_VERSION}" \
              --distribution-type bin \
              --no-daemon

            for i in {1..3}; do
              if unzip -q -p "$WRAPPER_JAR" META-INF/MANIFEST.MF 2>/dev/null | grep -q "GradleWrapperMain"; then
                echo "✅ Wrapper generado correctamente (intento $i)."
                break
              fi
              echo "⚠️ Intento $i fallido. Esperando..."
              sleep 2
            done
          else
            echo "✅ Wrapper JAR válido."
          fi

          if [ -f "$WRAPPER_PROPS" ]; then
            GRADLE_URL=$(grep "distributionUrl" "$WRAPPER_PROPS" | head -1)
            echo "📋 Gradle distribution: $GRADLE_URL"
            GRADLE_MAJOR=$(echo "$GRADLE_URL" | grep -oP 'gradle-\K[0-9]+' | head -1)
            GRADLE_MINOR=$(echo "$GRADLE_URL" | grep -oP 'gradle-[0-9]+\.\K[0-9]+' | head -1)
            if [ -n "$GRADLE_MAJOR" ] && [ "$GRADLE_MAJOR" -ge 8 ]; then
              if [ -n "$GRADLE_MINOR" ] && [ "$GRADLE_MINOR" -ge 7 ]; then
                echo "✅ Versión Gradle compatible con AGP 8.6.1 (${GRADLE_MAJOR}.${GRADLE_MINOR})"
              else
                echo "⚠️ Gradle ${GRADLE_MAJOR}.${GRADLE_MINOR} puede ser incompatible con AGP 8.6.1 (requiere ≥ 8.7)"
              fi
            fi
          fi

          chmod +x ./gradlew
          ls -lh "$WRAPPER_JAR"

      - name: 6. Configurar Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      - name: 7. Validar configuración del proyecto (v3.9)
        shell: bash
        run: |
          echo "🔍 Verificando archivos críticos del proyecto..."

          # Verificar que themes.xml tiene los estilos necesarios
          THEMES_DAY="app/src/main/res/values/themes.xml"
          if [ -f "$THEMES_DAY" ]; then
            if grep -q "Theme.LensPro.Settings" "$THEMES_DAY"; then
              echo "✅ Theme.LensPro.Settings definido en themes.xml (día)"
            else
              echo "❌ ERROR: Theme.LensPro.Settings NO encontrado en $THEMES_DAY"
              exit 1
            fi
          fi

          # FIX v3.9: verificar que dexOptions ya NO está en build.gradle
          if grep -q "dexOptions" app/build.gradle; then
            echo "⚠️  WARNING: dexOptions{} aún presente en app/build.gradle"
            echo "   Este bloque fue removido en AGP 8.0 — puede causar warnings."
          else
            echo "✅ dexOptions eliminado (correcto para AGP 8.6+)"
          fi

          # Verificar que data_extraction_rules.xml existe
          if [ -f "app/src/main/res/xml/data_extraction_rules.xml" ]; then
            echo "✅ data_extraction_rules.xml presente"
          else
            echo "⚠️  data_extraction_rules.xml ausente — Android 12+ recomienda declararlo"
          fi

          # Verificar que BlurredBackdrop.kt tiene el fix v2.0
          if grep -q "BLUR_RADIUS_PX = 25f" app/src/main/java/com/rodyto/lenspro/ui/components/BlurredBackdrop.kt; then
            echo "✅ BlurredBackdrop.kt v2.0 aplicado (FIX crash Android 16)"
          else
            echo "⚠️  BlurredBackdrop.kt NO tiene el fix v2.0 — puede crashear en Android 16/S21 FE"
          fi

          echo "✅ Validación de proyecto completada."

      - name: 8. Compilar APK Debug
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon --warning-mode=summary

      - name: 9. Subir APK como artefacto
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: LensPro-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: 10. Subir reportes en caso de fallo
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
            app/build/outputs/logs/
            app/build/intermediates/merged_native_libs/
          if-no-files-found: ignore
