name: Android CI Build - Rodyto Lens Pro

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout del código
        uses: actions/checkout@v4

      - name: 2. Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 3. Configurar SDK de Android
        uses: android-actions/setup-android@v3

      - name: 4. Instalar plataformas (API 34) + NDK + CMake
        shell: bash
        run: |
          echo "y" | sdkmanager --install \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.1.8937393" \
            "cmake;3.22.1"

      - name: 5. Generar gradle-wrapper.jar (método 100% fiable)
        shell: bash
        run: |
          set -e
          WRAPPER_JAR="gradle/wrapper/gradle-wrapper.jar"
          mkdir -p gradle/wrapper

          NEEDS_FIX=0
          if [ ! -s "$WRAPPER_JAR" ]; then
            echo "⚠️  gradle-wrapper.jar no existe o está vacío."
            NEEDS_FIX=1
          else
            if ! unzip -p "$WRAPPER_JAR" META-INF/MANIFEST.MF 2>/dev/null \
                 | tr -d '\r' | grep -q "^Main-Class: org.gradle.wrapper.GradleWrapperMain$"; then
              echo "⚠️  gradle-wrapper.jar inválido. Regenerando..."
              NEEDS_FIX=1
            fi
          fi

          if [ "$NEEDS_FIX" = "1" ]; then
            rm -f "$WRAPPER_JAR"
            echo "📥 Descargando distribución oficial Gradle 8.7..."
            curl -fL --retry 5 --retry-delay 3 -o /tmp/gradle.zip \
              "https://services.gradle.org/distributions/gradle-8.7-bin.zip"

            echo "📦 Extrayendo Gradle..."
            unzip -q -o /tmp/gradle.zip -d /tmp/gradle-dist

            echo "🔧 Instalando Gradle temporal y generando wrapper..."
            export PATH="/tmp/gradle-dist/gradle-8.7/bin:$PATH"
            gradle wrapper --gradle-version 8.7 --distribution-type bin --no-daemon

            # Verificación final
            if ! unzip -p "$WRAPPER_JAR" META-INF/MANIFEST.MF 2>/dev/null \
                 | tr -d '\r' | grep -q "^Main-Class: org.gradle.wrapper.GradleWrapperMain$"; then
              echo "❌ Regeneración falló."
              exit 1
            fi
            echo "✅ Wrapper regenerado correctamente."
            unzip -p "$WRAPPER_JAR" META-INF/MANIFEST.MF | head -5
          else
            echo "✅ Wrapper válido, no se requiere reparación."
          fi

          chmod +x ./gradlew
          ls -lh "$WRAPPER_JAR"

      - name: 6. Configurar Gradle (cache)
        uses: gradle/actions/setup-gradle@v3

      - name: 7. Compilar APK Debug
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: 8. Subir APK como artefacto
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: LensPro-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: 9. (Opcional) Subir reporte si falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
            app/build/outputs/logs/
