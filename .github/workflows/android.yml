name: Android CI Build - Rodyto Lens Pro

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # Quitamos el cache de gradle temporalmente para asegurar una limpieza total
    
    - name: Configurar SDK de Android
      uses: android-actions/setup-android@v3

    - name: Instalar NDK y CMake específicos
      run: |
        echo "y" | sdkmanager --install "ndk;25.1.8937393" "cmake;3.22.1"
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.1.8937393" >> $GITHUB_ENV

    - name: Compilar con Gradle del Sistema
      # En lugar de ./gradlew (que usa tu archivo corrupto), usamos 'gradle' directo.
      # Esto ignora tu carpeta gradle/wrapper y usa el motor oficial de la VM de GitHub.
      run: gradle assembleDebug --stacktrace

    - name: Subir APK generado
      uses: actions/upload-artifact@v4
      with:
        name: RodytoLensPro-Alpha
        path: app/build/outputs/apk/debug/app-debug.apk
