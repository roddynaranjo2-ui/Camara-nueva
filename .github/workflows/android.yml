name: Android CI Build - Rodyto Lens Pro

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout del código
        uses: actions/checkout@v4

      - name: 2. Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 3. Configurar SDK de Android
        uses: android-actions/setup-android@v3

      - name: 4. Instalar plataformas (API 34) + NDK + CMake
        shell: bash
        run: |
          echo "y" | sdkmanager --install \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.1.8937393" \
            "cmake;3.22.1"

      - name: 5. Reparar Gradle Wrapper (forzado y verificado)
        shell: bash
        run: |
          set -e
          WRAPPER_JAR="gradle/wrapper/gradle-wrapper.jar"
          mkdir -p gradle/wrapper

          NEEDS_FIX=0
          if [ ! -s "$WRAPPER_JAR" ]; then
            echo "⚠️  gradle-wrapper.jar no existe o está vacío."
            NEEDS_FIX=1
          else
            # Verificamos que el manifest tenga la Main-Class correcta
            if ! unzip -p "$WRAPPER_JAR" META-INF/MANIFEST.MF 2>/dev/null \
                 | tr -d '\r' | grep -q "^Main-Class: org.gradle.wrapper.GradleWrapperMain$"; then
              echo "⚠️  gradle-wrapper.jar NO tiene 'Main-Class: org.gradle.wrapper.GradleWrapperMain'. Regenerando..."
              NEEDS_FIX=1
            fi
          fi

          if [ "$NEEDS_FIX" = "1" ]; then
            rm -f "$WRAPPER_JAR"
            curl -fL --retry 3 --retry-delay 2 -o "$WRAPPER_JAR" \
              "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar"

            # Verificación post-descarga
            if ! unzip -p "$WRAPPER_JAR" META-INF/MANIFEST.MF 2>/dev/null \
                 | tr -d '\r' | grep -q "^Main-Class: org.gradle.wrapper.GradleWrapperMain$"; then
              echo "❌ Descarga válida falló. Probando con la URL alternativa de gradle.org..."
              rm -f "$WRAPPER_JAR"
              curl -fL --retry 3 --retry-delay 2 -o /tmp/gradle.zip \
                "https://services.gradle.org/distributions/gradle-8.7-bin.zip"
              unzip -j -o /tmp/gradle.zip "gradle-8.7/lib/plugins/gradle-wrapper-*.jar" -d /tmp/wrapper
              cp /tmp/wrapper/gradle-wrapper-*.jar "$WRAPPER_JAR"
            fi

            echo "✅ Wrapper regenerado correctamente:"
            unzip -p "$WRAPPER_JAR" META-INF/MANIFEST.MF | head -5
          else
            echo "✅ Wrapper válido, no se requiere reparación."
          fi

          chmod +x ./gradlew

      - name: 6. Configurar Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 7. Compilar APK Debug
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: 8. Subir APK como artefacto
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: LensPro-debug-apk
          path: app/build/outputs/apk/debug/*.apk
