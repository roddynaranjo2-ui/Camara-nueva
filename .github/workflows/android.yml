name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Instalar NDK y CMake
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.1.8937393" "cmake;3.22.1"

    - name: Dar permisos de ejecución a Gradlew
      run: chmod +x gradlew

    - name: Generar Gradle Wrapper
      run: gradle wrapper --gradle-version 8.1.1

    - name: Compilar APK con Gradle
      run: ./gradlew assembleDebug

    - name: Subir APK generada
      uses: actions/upload-artifact@v4
      with:
        name: RodytoLensPro-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
