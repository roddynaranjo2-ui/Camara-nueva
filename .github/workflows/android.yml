- name: 5. Reparación Inteligente del Gradle Wrapper
  shell: bash
  run: |
    set -euo pipefail

    echo "🚀 Verificando Gradle Wrapper..."

    WRAPPER_DIR="gradle/wrapper"
    WRAPPER_JAR="$WRAPPER_DIR/gradle-wrapper.jar"
    WRAPPER_PROPERTIES="$WRAPPER_DIR/gradle-wrapper.properties"

    mkdir -p "$WRAPPER_DIR"

    NEEDS_FIX=0

    # -----------------------------
    # Verificar existencia del JAR
    # -----------------------------
    if [ ! -f "$WRAPPER_JAR" ]; then
      echo "⚠️ gradle-wrapper.jar no existe."
      NEEDS_FIX=1
    elif [ ! -s "$WRAPPER_JAR" ]; then
      echo "⚠️ gradle-wrapper.jar está vacío."
      NEEDS_FIX=1
    else
      echo "🔍 Verificando integridad del JAR..."

      if ! unzip -p "$WRAPPER_JAR" META-INF/MANIFEST.MF 2>/dev/null \
        | tr -d '\r' \
        | grep -q "GradleWrapperMain"; then

        echo "⚠️ gradle-wrapper.jar corrupto o inválido."
        NEEDS_FIX=1
      fi
    fi

    # -----------------------------
    # Reparación automática
    # -----------------------------
    if [ "$NEEDS_FIX" = "1" ]; then

      echo "🛠️ Iniciando reparación automática..."

      rm -f "$WRAPPER_JAR"

      # Descargar distribución oficial completa
      curl -fL --retry 5 --retry-delay 3 \
        -o /tmp/gradle-8.7-bin.zip \
        https://services.gradle.org/distributions/gradle-8.7-bin.zip

      echo "📦 Extrayendo wrapper oficial..."

      unzip -q /tmp/gradle-8.7-bin.zip \
        "gradle-8.7/lib/plugins/gradle-wrapper-*.jar" \
        -d /tmp/gradle-extract

      FOUND_JAR=$(find /tmp/gradle-extract -name "*.jar" | head -1)

      if [ -z "$FOUND_JAR" ]; then
        echo "❌ No se pudo encontrar gradle-wrapper.jar dentro del ZIP."
        exit 1
      fi

      cp "$FOUND_JAR" "$WRAPPER_JAR"

      echo "✅ Wrapper copiado correctamente."

      # Verificación final REAL
      if ! unzip -p "$WRAPPER_JAR" META-INF/MANIFEST.MF 2>/dev/null \
        | tr -d '\r' \
        | grep -q "GradleWrapperMain"; then

        echo "❌ El wrapper descargado sigue siendo inválido."
        exit 1
      fi

      echo "✅ Gradle Wrapper reparado exitosamente."
    else
      echo "✅ Wrapper válido. No se requiere reparación."
    fi

    # -----------------------------
    # Verificar properties
    # -----------------------------
    if [ ! -f "$WRAPPER_PROPERTIES" ]; then
      echo "⚠️ gradle-wrapper.properties no existe. Recreando..."

      cat > "$WRAPPER_PROPERTIES" <<EOF
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF
    fi

    chmod +x ./gradlew

    echo "📋 Estado final:"
    ls -lah "$WRAPPER_DIR"

    echo "🧪 Probando Gradle..."
    ./gradlew --version