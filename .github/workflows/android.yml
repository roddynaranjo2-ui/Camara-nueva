name: Android CI Build - Rodyto Lens Pro

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout del código
        uses: actions/checkout@v4

      - name: 2. Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: 3. Configurar SDK de Android
        uses: android-actions/setup-android@v3

      - name: 4. Instalar plataformas + NDK actualizado + CMake
        shell: bash
        run: |
          echo "y" | sdkmanager --install \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;26.1.10909125" \
            "cmake;3.22.1"

      - name: 5. Generar / Reparar Gradle Wrapper (mejorado y robusto)
        shell: bash
        run: |
          set -e
          WRAPPER_JAR="gradle/wrapper/gradle-wrapper.jar"
          mkdir -p gradle/wrapper

          echo "🔍 Verificando Gradle Wrapper..."
          if [ ! -s "$WRAPPER_JAR" ] || ! unzip -q -p "$WRAPPER_JAR" META-INF/MANIFEST.MF 2>/dev/null | grep -q "GradleWrapperMain"; then
            echo "⚠️  Wrapper inválido o ausente. Regenerando..."
            rm -f "$WRAPPER_JAR"

            curl -fL --retry 5 --retry-delay 3 -o /tmp/gradle.zip "https://services.gradle.org/distributions/gradle-8.7-bin.zip"
            unzip -q -o /tmp/gradle.zip -d /tmp/gradle-dist
            export PATH="/tmp/gradle-dist/gradle-8.7/bin:$PATH"

            echo "🔧 Generando wrapper oficial..."
            gradle wrapper --gradle-version 8.7 --distribution-type bin --no-daemon

            # Verificación más tolerante con reintentos
            for i in {1..3}; do
              if unzip -q -p "$WRAPPER_JAR" META-INF/MANIFEST.MF 2>/dev/null | grep -q "GradleWrapperMain"; then
                echo "✅ Wrapper generado correctamente (intento $i)."
                break
              fi
              echo "⚠️ Intento $i fallido. Esperando..."
              sleep 2
            done
          else
            echo "✅ Wrapper válido."
          fi

          chmod +x ./gradlew
          ls -lh "$WRAPPER_JAR"

      - name: 6. Configurar Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      - name: 7. Compilar APK Debug
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: 8. Subir APK como artefacto
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: LensPro-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: 9. Subir reportes en caso de fallo
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
            app/build/outputs/logs/
