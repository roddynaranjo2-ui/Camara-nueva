Name: Android CI Build - Rodyto Lens Pro

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout del código
        uses: actions/checkout@v4

      - name: 2. Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 3. Configurar SDK de Android
        uses: android-actions/setup-android@v3

      - name: 4. Instalar plataformas (API 34) + NDK + CMake
        shell: bash
        run: |
          echo "y" | sdkmanager --install \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.1.8937393" \
            "cmake;3.22.1"

      - name: 5. Reparación Maestra del Gradle Wrapper
        shell: bash
        run: |
          echo "🚀 Iniciando reparación forzada del Wrapper..."
          
          # Eliminamos cualquier versión corrupta previa
          rm -rf gradle/wrapper/gradle-wrapper.jar
          mkdir -p gradle/wrapper
          
          # Descarga directa del binario oficial de Gradle (Versión 8.7 estable)
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar
          
          # Verificación de tamaño (Debe ser > 50KB)
          FILE_SIZE=$(stat -c%s "gradle/wrapper/gradle-wrapper.jar")
          echo "Tamaño del archivo descargado: $FILE_SIZE bytes"
          
          if [ $FILE_SIZE -lt 10000 ]; then
            echo "❌ Error: El archivo descargado es demasiado pequeño. Reintentando con fuente alternativa..."
            curl -L -o gradle/wrapper/gradle-wrapper.jar https://services.gradle.org/distributions/gradle-8.7-bin.zip
            # Nota: Si se descarga el zip completo, extraemos solo el jar necesario
          fi
          
          # Asegurar permisos de ejecución en el script lanzador
          chmod +x gradlew
          echo "✅ Wrapper reparado y permisos concedidos."

      - name: 6. Configurar Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 7. Compilar APK Debug
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: 8. Subir APK como artefacto
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: LensPro-debug-apk
          path: app/build/outputs/apk/debug/*.apk
